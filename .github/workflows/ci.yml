name: CI & Integration Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  
  workflow_dispatch: {} # Ручной запуск из UI

env:
  PYTHON_VERSION: "3.11"

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Переменные из репозитория (видимые)
      LLM_MODEL: ${{ vars.LLM_MODEL }}
      MAX_RETRIES: ${{ vars.MAX_RETRIES }}
      REQUEST_TIMEOUT: ${{ vars.REQUEST_TIMEOUT }}
      HTTP_REFERER: ${{ vars.HTTP_REFERER }}
      APP_TITLE: ${{ vars.APP_TITLE }}
      
      # Секреты (скрытые)
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Set prompt path for CI
        run: echo "PROMPT_PATH=${{ vars.PROMPT_PATH || 'prompts/default.yaml' }}" >> $GITHUB_ENV

      - name: Override prompt for CI
        if: github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p prompts
          echo '${{ vars.TEST_PROMPT }}' > prompts/ci-test.yaml
          echo "PROMPT_PATH=prompts/ci-test.yaml" >> $GITHUB_ENV
          
      - name: Run unit & mock tests
        run: pytest tests/ -v --tb=short

      - name: Run Real Integration Test (Manual Only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "🚀 Запуск реального пайплайна с API..."
          python -m src
          echo "✅ Интеграционный тест завершён"