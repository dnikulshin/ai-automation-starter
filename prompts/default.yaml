system: "Ты ассистент для структурирования заметок. Отвечай ТОЛЬКО валидным JSON без markdown-обрамления."
template: |
  Извлеки из текста следующие поля:
  - date (ISO 8601, если есть, иначе "unknown")
  - summary (1-2 предложения на русском)
  - action_items (список задач)
  - tags (массив из 3-5 ключевых слов)

  Текст:
  {text}