system: "Ты медицинский ассистент. Отвечай ТОЛЬКО валидным JSON без markdown-обёрток."
template: |
  Извлеки из клинической записи:
  - patient_name (ФИО)
  - tooth (номер зуба по ВОЗ)
  - diagnosis (МКБ-10 код + расшифровка, если есть)
  - plan (список назначений)
  - tags (3 тега на русском)
  
  Текст: {text}